{% extends "base.html" %}
{% block title %}Add Lecturer{% endblock %}

{% block content %}
<style>
    .form-card {
        background: #fff;
        border: 1px solid #e2e2e2;
        border-radius: 10px;
        padding: 1.5rem;
        max-width: 420px;
    }
    .form-card label {
        display: block;
        margin-top: 1rem;
        margin-bottom: 0.3rem;
        font-weight: 500;
    }
    .form-card input[type="text"],
    .form-card input[type="password"] {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
    }
    .checkbox-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.1rem;
    }
    .checkbox-row label {
        margin: 0;
        font-weight: 400;
    }
    .submit-btn {
        margin-top: 1.5rem;
        padding: 0.7rem 1.5rem;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
    }
</style>

<h1>Add Lecturer</h1>

<div class="form-card">
    <form method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" required>

        <div class="checkbox-row">
            <input type="checkbox" id="is_admin" name="is_admin">
            <label for="is_admin">Grant Admin Panel access</label>
        </div>

        <button type="submit" class="submit-btn">Add Lecturer</button>
    </form>
</div>
{% endblock %}
